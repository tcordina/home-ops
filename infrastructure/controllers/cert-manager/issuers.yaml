---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    # Serveur Let's Encrypt Production
    server: https://acme-v02.api.letsencrypt.org/directory
    
    # Email pour les notifications (expirations, etc.)
    email: acme@tablar.ovh
    
    # Secret pour stocker la clé privée du compte ACME
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    
    # Challenge DNS-01 avec OVH
    solvers:
    - dns01:
        webhook:
          groupName: acme.ovh.com
          solverName: ovh
          config:
            endpoint: ovh-eu
            applicationKeySecretRef:
              name: ovh-credentials
              key: applicationKey
            applicationSecretSecretRef:
              name: ovh-credentials
              key: applicationSecret
            consumerKeySecretRef:
              name: ovh-credentials
              key: consumerKey
---
# ClusterIssuer pour staging (tests)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: acme@tablar.ovh
    privateKeySecretRef:
      name: letsencrypt-staging-account-key
    solvers:
    - dns01:
        webhook:
          groupName: acme.ovh.com
          solverName: ovh
          config:
            endpoint: ovh-eu
            applicationKeySecretRef:
              name: ovh-credentials
              key: applicationKey
            applicationSecretSecretRef:
              name: ovh-credentials
              key: applicationSecret
            consumerKeySecretRef:
              name: ovh-credentials
              key: consumerKey