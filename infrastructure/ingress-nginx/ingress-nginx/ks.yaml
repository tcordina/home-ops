apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: ingress-nginx
  namespace: flux-system
spec:
  dependsOn:
  - name: prometheus-stack
  interval: 5m
  path: "./infrastructure/ingress-nginx/ingress-nginx/app"
  prune: true
  wait: true
  targetNamespace: ingress-nginx
  sourceRef:
    kind: GitRepository
    name: flux-system
