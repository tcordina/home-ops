---
apiVersion: v1
kind: Namespace
metadata:
  name: cert-manager
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: cert-manager
  namespace: cert-manager
spec:
  interval: 1h
  url: https://charts.jetstack.io
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: cert-manager
spec:
  interval: 30m
  version: "1.19.x"
  sourceRef:
    kind: HelmRepository
    name: cert-manager
    namespace: cert-manager
  values:
    crds: 
      enabled: true
      keep: true
    prometheus:
      enabled: false