apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: csi-driver-nfs
  namespace: flux-system
spec:
  interval: 5m
  path: "./infrastructure/kube-system/csi-driver-nfs/app"
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  targetNamespace: kube-system
  decryption:
    provider: sops
    secretRef:
      name: sops-age
