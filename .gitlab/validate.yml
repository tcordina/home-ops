validate-kubernetes:
  stage: validate
  rules:
    - # ignore changes made by renovate
      if: $CI_COMMIT_TITLE =~ /^chore\(deps\):/
      when: never
    - if: $CI_PIPELINE_SOURCE == "push"
      changes:
        - kubernetes/apps/**/*
        - kubernetes/clusters/**/*
        - kubernetes/components/**/*
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - kubernetes/apps/**/*
        - kubernetes/clusters/**/*
        - kubernetes/components/**/*
  image:
    name: alpine:3
  before_script:
    - apk add --no-cache curl bash gettext
    - curl -sL "https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz"
      | tar xz -C /usr/local/bin
    - curl -sL "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh"
      | bash && mv kustomize /usr/local/bin/
  script:
    - |
      # Dummy values matching the schema of each Flux substitution variable
      export DOMAIN=example.com
      export NFS_IP=192.168.1.1
      export NFS_MOVIES_PATH=/mnt/movies
      export NFS_VOLUMES_PATH=/mnt/volumes
      export TIMEZONE=UTC
      export CLUSTER_GIT_REF=refs/heads/main
      export CLUSTER_SYNC_PATH=kubernetes/clusters/main

      find kubernetes/apps kubernetes/components -name 'kustomization.yaml' \
        -not -path '*/scaffold/*' | \
      while IFS= read -r f; do
        echo "---"
        kustomize build "$(dirname "$f")" 2>/dev/null || true
      done | \
      envsubst '${DOMAIN} ${NFS_IP} ${NFS_MOVIES_PATH} ${NFS_VOLUMES_PATH} ${TIMEZONE} ${CLUSTER_GIT_REF} ${CLUSTER_SYNC_PATH}' | \
      kubeconform \
        -strict \
        -ignore-missing-schemas \
        -skip Secret \
        -schema-location default \
        -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
        -summary
  tags:
    - docker
