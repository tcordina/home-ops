apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 2m
  timeout: 5m
  # dependsOn:
  #   - name: infra-configs
  sourceRef:
    kind: ExternalArtifact
    name: apps
  path: ./apps
  prune: true
  wait: true