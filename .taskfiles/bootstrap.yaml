---
# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: "3"

tasks:
  default:
    desc: "Full cluster bootstrap (kubeconfig then cluster)"
    cmds:
      - task: kubeconfig
      - task: cluster

  kubeconfig:
    desc: "Grab kubeconfig from cluster"
    dir: "{{.BOOTSTRAP_DIR}}"
    env:
      KUBE_CONTEXT: "{{.env}}"
    cmds:
      - bash grab-kubeconfig.sh

  cluster:
    desc: "Bootstrap the cluster / e.g. task bootstrap:cluster env=main"
    dir: "{{.BOOTSTRAP_DIR}}"
    requires:
      vars:
        - name: env
          enum: [main, staging]
    env:
      CLUSTER_GIT_REF: "refs/heads/{{.env}}"
      CLUSTER_SYNC_PATH: "kubernetes/clusters/{{.env}}"
      KUBECONFIG: "{{.KUBECONFIG}}"
      KUBE_CONTEXT: "{{.env}}"
    cmds:
      - bash bootstrap.sh

  dir:
    desc: "Create directory scaffold for new K8s app / e.g. task bootstrap:dir ns=monitoring app=grafana"
    dir: "{{.KUBERNETES_DIR}}"
    requires:
      vars: [ns, app]
    cmds:
      - mkdir -p apps/{{.ns}}/{{.app}}/app
      - touch -a apps/{{.ns}}/namespace.yaml
      - touch -a apps/{{.ns}}/kustomization.yaml
      - touch -a apps/{{.ns}}/{{.app}}/ks.yaml
      - touch -a apps/{{.ns}}/{{.app}}/app/helm-release.yaml
