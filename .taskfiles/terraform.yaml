---
# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"

tasks:
  init:
    desc: "Run terraform init / e.g. task tf:init dir=haproxy"
    requires:
      vars:
        - name: dir
          enum: [haproxy, k3s-nodes]
    dir: "{{.TERRAFORM_DIR}}/{{.dir}}"
    cmds:
      - terraform init

  plan:
    desc: "Run terraform plan / e.g. task tf:plan dir=haproxy"
    requires:
      vars:
        - name: dir
          enum: [haproxy, k3s-nodes]
    dir: "{{.TERRAFORM_DIR}}/{{.dir}}"
    cmds:
      - terraform plan -var-file="{{.TERRAFORM_DIR}}/{{.dir}}/secrets.auto.tfvars"

  apply:
    desc: "Apply terraform with auto-approve / e.g. task tf:apply dir=haproxy"
    requires:
      vars:
        - name: dir
          enum: [haproxy, k3s-nodes]
    dir: "{{.TERRAFORM_DIR}}/{{.dir}}"
    cmds:
      - terraform apply -var-file="{{.TERRAFORM_DIR}}/{{.dir}}/secrets.auto.tfvars" -auto-approve

  destroy:
    desc: "Destroy terraform infrastructure / e.g. task tf:destroy dir=haproxy"
    requires:
      vars:
        - name: dir
          enum: [haproxy, k3s-nodes]
    dir: "{{.TERRAFORM_DIR}}/{{.dir}}"
    cmds:
      - terraform destroy -var-file="{{.TERRAFORM_DIR}}/{{.dir}}/secrets.auto.tfvars" -auto-approve
