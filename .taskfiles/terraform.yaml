---
# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"

vars:
  TERRAFORM_DIR: "{{.ROOT_DIR}}/infrastructure/terraform"

x-module: &module
  requires:
    vars:
      - name: module # relative path from the "infrastructure/terraform" directory
  dir: "{{.TERRAFORM_DIR}}/{{.module}}"
  preconditions:
    - msg: "Local module {{.module}} does not exist"
      sh: "test -d {{.TERRAFORM_DIR}}/{{.module}}"

tasks:
  init:
    desc: "Run terraform init / e.g. task tf:init module=main/haproxy"
    <<: *module
    cmds:
      - terraform init

  plan:
    desc: "Run terraform plan / e.g. task tf:plan module=main/haproxy"
    <<: *module
    cmds:
      - terraform plan -var-file="{{.TERRAFORM_DIR}}/{{.module}}/secrets.auto.tfvars"

  apply:
    desc: "Run terraform apply / e.g. task tf:apply module=main/haproxy"
    <<: *module
    cmds:
      - terraform apply -var-file="{{.TERRAFORM_DIR}}/{{.module}}/secrets.auto.tfvars"

  destroy:
    desc: "Run terraform destroy / e.g. task tf:destroy module=main/haproxy"
    <<: *module
    cmds:
      - terraform destroy -var-file="{{.TERRAFORM_DIR}}/{{.module}}/secrets.auto.tfvars"

  output:
    desc: "Run terraform output / e.g. task tf:output module=main/haproxy"
    <<: *module
    cmds:
      - terraform output

  reset:
    desc: "Destroy then re-apply a module / e.g. task tf:reset module=main/haproxy"
    <<: *module
    cmds:
      - task: destroy
        vars: { module: "{{.module}}" }
      - task: apply
        vars: { module: "{{.module}}" }
