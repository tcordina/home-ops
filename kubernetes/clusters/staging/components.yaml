apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: components
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 2m
  timeout: 1h
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/components
  prune: false
  wait: true
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-settings
      # - kind: Secret
      #   name: cluster-secrets
