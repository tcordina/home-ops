apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 2m
  timeout: 1h
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/apps
  prune: false
  wait: true
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-settings
      # - kind: Secret
      #   name: cluster-secrets
  patches:
    - # Add Kustomization defaults for all child Kustomizations
      patch: |-
        apiVersion: kustomize.toolkit.fluxcd.io/v1
        kind: Kustomization
        metadata:
          name: _
        spec:
          postBuild:
            substituteFrom:
              - kind: ConfigMap
                name: cluster-settings
                optional: true
          decryption:
            provider: sops
          patches:
            - patch: |-
                apiVersion: helm.toolkit.fluxcd.io/v2
                kind: HelmRelease
                metadata:
                  name: _
                spec:
                  install:
                    crds: CreateReplace
                    strategy:
                      name: RetryOnFailure
                  rollback:
                    cleanupOnFail: true
                    recreate: true
                  upgrade:
                    cleanupOnFail: true
                    crds: CreateReplace
                    strategy:
                      name: RemediateOnFailure
                    remediation:
                      remediateLastFailure: true
                      retries: 2
              target:
                group: helm.toolkit.fluxcd.io
                kind: HelmRelease

            # Staging: skip TLS verification for oauth2-proxy (LE staging CA untrusted)
            - patch: |-
                - op: add
                  path: /spec/values/extraArgs/ssl-insecure-skip-verify
                  value: "true"
              target:
                group: helm.toolkit.fluxcd.io
                kind: HelmRelease
                name: oauth2-proxy

            # Staging: reduce ingress-nginx from 3 replicas to 1
            - patch: |-
                - op: replace
                  path: /spec/values/controller/replicaCount
                  value: 1
              target:
                group: helm.toolkit.fluxcd.io
                kind: HelmRelease
                name: ingress-nginx

            # Staging: reduce coredns from 3 replicas to 1
            - patch: |-
                - op: replace
                  path: /spec/values/replicaCount
                  value: 1
              target:
                group: helm.toolkit.fluxcd.io
                kind: HelmRelease
                name: coredns

            # Staging: reduce longhorn component and data replicas to 1
            - patch: |-
                apiVersion: helm.toolkit.fluxcd.io/v2
                kind: HelmRelease
                metadata:
                  name: longhorn
                spec:
                  values:
                    persistence:
                      defaultClassReplicaCount: 1
                    csi:
                      attacherReplicaCount: 1
                      provisionerReplicaCount: 1
                      resizerReplicaCount: 1
                      snapshotterReplicaCount: 1
              target:
                group: helm.toolkit.fluxcd.io
                kind: HelmRelease
                name: longhorn

            # Staging: reduce longhorn StorageClass data replicas to 1
            - patch: |-
                - op: replace
                  path: /parameters/numberOfReplicas
                  value: "1"
              target:
                kind: StorageClass
                name: longhorn-local

            - patch: |-
                - op: replace
                  path: /parameters/numberOfReplicas
                  value: "1"
              target:
                kind: StorageClass
                name: longhorn-backup
      target:
        group: kustomize.toolkit.fluxcd.io
        kind: Kustomization
