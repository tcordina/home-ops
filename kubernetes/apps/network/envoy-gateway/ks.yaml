---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: envoy-gateway
  namespace: flux-system
spec:
  interval: 5m
  prune: true
  wait: true

  path: ./kubernetes/apps/network/envoy-gateway/app
  sourceRef:
    kind: GitRepository
    name: flux-system

  dependsOn: []
  # dependsOn:
  #   - name: certs
