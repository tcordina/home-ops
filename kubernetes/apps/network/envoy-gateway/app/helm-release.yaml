apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: envoy-gateway
  namespace: network
spec:
  interval: 1h
  chart:
    spec:
      chart: gateway
      version: "v1.4.1"
      sourceRef:
        kind: HelmRepository
        name: envoy-gateway
        namespace: network
  values:
    deployment:
      replicas: 2
