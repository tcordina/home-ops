---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: metallb
  namespace: network
spec:
  interval: 1h
  timeout: 1h
  chart:
    spec:
      # renovate: registryUrl=https://metallb.github.io/metallb
      chart: metallb
      version: 0.16.1
      sourceRef:
        kind: HelmRepository
        name: metallb
  values:
    crds:
      enabled: true

    prometheus:
      serviceAccount: kube-prometheus-stack-prometheus
      namespace: monitoring
      serviceMonitor:
        enabled: true
      prometheusRule:
        enabled: true
        # disable alerts for %usage of AddressPool since we only give it one address
        addressPoolExhausted:
          enabled: false
        addressPoolUsage:
          enabled: false
