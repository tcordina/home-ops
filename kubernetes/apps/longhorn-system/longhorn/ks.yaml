apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: longhorn
  namespace: flux-system
spec:
  dependsOn:
    - name: snapshot-controller
      namespace: flux-system
  interval: 5m
  path: ./kubernetes/apps/longhorn-system/longhorn/app
  prune: false
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
