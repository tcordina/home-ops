---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jellyfin
spec:
  interval: 1h
  timeout: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: default

  values:
    global:
      createDefaultServiceAccount: false

    controllers:
      jellyfin:
        pod:
          securityContext:
            fsGroup: 1000
            fsGroupChangePolicy: "OnRootMismatch"
            runAsGroup: 1000
            runAsNonRoot: true
            runAsUser: 1000
        containers:
          app:
            image:
              repository: ghcr.io/jellyfin/jellyfin
              tag: 10.11.11
            env:
              TZ: ${TIMEZONE}
              DOTNET_SYSTEM_IO_DISABLEFILELOCKING: "true"
              JELLYFIN_FFmpeg__probesize: 50000000
              JELLYFIN_FFmpeg__analyzeduration: 50000000
            resources:
              requests:
                cpu: 200m
                memory: 1024Mi
              limits:
                memory: 1024Mi

            probes:
              liveness: &probe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: &port 8096
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 30
              readiness: *probe
              startup: *probe

            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }

    service:
      app:
        ports:
          http:
            port: *port

    route:
      jellyfin:
        enabled: true
        kind: HTTPRoute
        parentRefs:
          - name: main-gateway
            namespace: network
            sectionName: https
        hostnames:
          - cinema.${DOMAIN}
        rules:
          - backendRefs:
              - identifier: app
                port: *port

    persistence:
      config:
        existingClaim: ${APP}
        globalMounts:
          - path: /config
      movies-library:
        type: nfs
        server: ${NFS_IP}
        path: ${NFS_MOVIES_PATH}/data/media
        globalMounts:
          - path: /movies-library
            readOnly: false
      cache:
        type: emptyDir
        globalMounts:
          - path: /cache
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
