---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app immich
  namespace: flux-system
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  dependsOn:
    - name: immich-postgres
  interval: 1h
  path: ./kubernetes/apps/multimedia/immich/app
  prune: true
  retryInterval: 2m
  sourceRef:
    kind: GitRepository
    name: flux-system 
    namespace: flux-system
  timeout: 15m
  targetNamespace: multimedia
  wait: false
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app immich-postgres
  namespace: flux-system
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  dependsOn:
    - name: infrastructure
      namespace: flux-system
  interval: 1h
  path: ./kubernetes/apps/multimedia/immich/db
  prune: true
  retryInterval: 2m
  sourceRef:
    kind: GitRepository
    name: flux-system 
    namespace: flux-system
  timeout: 15m
  targetNamespace: multimedia
  wait: false
  decryption:
    provider: sops
    secretRef:
      name: sops-age