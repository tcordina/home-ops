---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageRepository
metadata:
  name: immich-server
  namespace: flux-system
spec:
  image: ghcr.io/immich-app/immich-server
  interval: 5m
---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImagePolicy
metadata:
  name: immich-server
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: immich-server
  filterTags:
    pattern: '^v(?P<semver>[0-9]*\.[0-9]*\.[0-9]*)$'
    extract: '$semver'
  policy:
    semver:
      range: '>=2.0.0 <3.0.0'