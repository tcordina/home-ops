apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name qbittorrent-vpn-auth
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-secretsmanager
    kind: ClusterSecretStore
  target:
    name: *name
  dataFrom:
  - extract:
      key: "multimedia/qbittorrent-vpn"