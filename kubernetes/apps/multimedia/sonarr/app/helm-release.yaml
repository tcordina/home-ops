---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: sonarr
spec:
  interval: 12h
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: 4.6.2
  url: oci://ghcr.io/bjw-s-labs/helm/app-template
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sonarr
spec:
  chartRef:
    kind: OCIRepository
    name: sonarr
  interval: 1h
  timeout: 1h
  values:
    controllers:
      sonarr:
        pod:
          securityContext:
            fsGroup: 1000
            fsGroupChangePolicy: "OnRootMismatch"
            runAsGroup: 1000
            runAsNonRoot: true
            runAsUser: 1000
        initContainers:
          init-config:
            image:
              repository: busybox
              tag: latest
            command:
              - sh
              - -c
              - |
                cp /template/config.xml.template /config/config.xml
                sed -i "s/@POSTGRES_USER@/$POSTGRES_USER/g" /config/config.xml
                sed -i "s/@POSTGRES_PASSWORD@/$POSTGRES_PASSWORD/g" /config/config.xml
                sed -i "s/@POSTGRES_HOST@/$POSTGRES_HOST/g" /config/config.xml
                sed -i "s/@POSTGRES_PORT@/$POSTGRES_PORT/g" /config/config.xml
            env:
              - name: POSTGRES_HOST
                valueFrom:
                  secretKeyRef:
                    name: sonarr-pguser-sonarr
                    key: host
              - name: POSTGRES_PORT
                valueFrom:
                  secretKeyRef:
                    name: sonarr-pguser-sonarr
                    key: port
              - name: POSTGRES_USER
                valueFrom:
                  secretKeyRef:
                    name: sonarr-pguser-sonarr
                    key: user
              - name: POSTGRES_PASSWORD
                valueFrom:
                  secretKeyRef:
                    name: sonarr-pguser-sonarr
                    key: password
        containers:
          app:
            image:
              repository: linuxserver/sonarr
              tag: 4.0.16
            env:
              SONARR__APP__INSTANCENAME: Sonarr
              SONARR__AUTH__METHOD: External
              SONARR__AUTH__REQUIRED: DisabledForLocalAddresses
              SONARR__LOG__DBENABLED: "False"
              SONARR__LOG__LEVEL: info
              SONARR__SERVER__PORT: &port 8989
              SONARR__UPDATE__BRANCH: develop
            envFrom:
              - secretRef:
                  name: sonarr-secret
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /ping
                    port: *port
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
            resources:
              requests:
                cpu: 20m
                memory: 384Mi
              limits:
                memory: 2Gi
            # securityContext:
            #   allowPrivilegeEscalation: false
            #   readOnlyRootFilesystem: true
            #   capabilities: { drop: ["ALL"] }

    service:
      app:
        ports:
          http:
            port: *port

    ingress:
      sonarr:
        enabled: true
        className: nginx
        hosts:
          - host: sonarr.lan.tablar.ovh
            paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: app
                  port: *port
        tls:
          - hosts:
              - sonarr.lan.tablar.ovh

    persistence:
      # persistence for /config directory
      # config:
      #   type: persistentVolumeClaim
      #   existingClaim: sonarr-config
      #   globalMounts:
      #     - path: /config

      # mounts used to inject postgres env variables inside /config/config.xml
      config-file:
        type: emptyDir
        globalMounts:
          - path: /config
      template:
        type: configMap
        name: sonarr-config-template
        advancedMounts:
          sonarr:
            init-config:
              - path: /template
                readOnly: true
      media:
        type: nfs
        server: 192.168.1.30
        path: /mnt/main/movies-library
        globalMounts:
          - path: /data/nas-media
            readOnly: false
      tmpfs:
        type: emptyDir
        globalMounts:
          - path: /tmp
            subPath: tmp
