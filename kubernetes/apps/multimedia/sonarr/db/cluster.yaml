---
# yaml-language-server: $schema=https://kubernetes-schemas.ok8.sh/postgres-operator.crunchydata.com/postgrescluster_v1beta1.json
apiVersion: postgres-operator.crunchydata.com/v1beta1
kind: PostgresCluster
metadata:
  name: &name sonarr
  namespace: multimedia
  labels:
    app.kubernetes.io/part-of: apps
spec:
  postgresVersion: 18
  databaseInitSQL:
    name: sonarr-postgres-init
    key: init.sql
  instances:
    - name: postgres
      metadata:
        labels:
          app.kubernetes.io/name: *name
      replicas: 1
      dataVolumeClaimSpec:
        accessModes:
          - "ReadWriteOnce"
        resources:
          requests:
            storage: 2Gi
        dataSource:
          kind: PersistentVolumeClaim
          name: sonarr-postgres
  users:
    # Superuser
    - name: "postgres"
      databases: ["postgres"]
      options: "SUPERUSER"
      password:
        type: AlphaNumeric
    # Applications
    - name: "sonarr"
      databases: ["sonarr-main", "sonarr-log"]
      options: "CREATEDB CREATEROLE"
      password:
        type: AlphaNumeric
