---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: csi-driver-nfs
  namespace: flux-system
spec:
  interval: 5m
  prune: true
  wait: true
  targetNamespace: kube-system

  path: ./kubernetes/apps/kube-system/csi-driver-nfs/app
  sourceRef:
    kind: GitRepository
    name: flux-system

  dependsOn: []
