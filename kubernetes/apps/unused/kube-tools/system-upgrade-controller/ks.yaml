---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: system-upgrade-controller
  namespace: flux-system
spec:
  interval: 5m
  prune: true
  wait: true

  path: ./kubernetes/apps/kube-tools/system-upgrade-controller/app
  sourceRef:
    kind: GitRepository
    name: flux-system

  dependsOn: []
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: system-upgrade-controller-plans
  namespace: flux-system
spec:
  interval: 5m
  prune: true
  wait: false

  path: ./kubernetes/apps/kube-tools/system-upgrade-controller/plans
  sourceRef:
    kind: GitRepository
    name: flux-system

  dependsOn: []
