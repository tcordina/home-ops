---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: flux-instance
  namespace: flux-system
  labels:
    kustomize.toolkit.fluxcd.io/name: infrastructure
    kustomize.toolkit.fluxcd.io/namespace: flux-system
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: flux-instance
  dependsOn:
    - name: flux-operator
  interval: 1h
  path: ./kubernetes/apps/flux-system/flux-instance/app
  prune: false # Never delete this
  targetNamespace: flux-system
  sourceRef:
    kind: GitRepository
    name: flux-system
  timeout: 5m
  wait: false
