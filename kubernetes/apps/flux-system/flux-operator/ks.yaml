---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: flux-operator
  namespace: flux-system
  labels:
    kustomize.toolkit.fluxcd.io/name: infrastructure
    kustomize.toolkit.fluxcd.io/namespace: flux-system
spec:
  interval: 1h
  timeout: 5m
  prune: true # Never delete this
  wait: false
  commonMetadata:
    labels:
      app.kubernetes.io/name: flux-operator
  targetNamespace: flux-system

  path: ./kubernetes/apps/flux-system/flux-operator/app
  sourceRef:
    kind: GitRepository
    name: flux-system

  dependsOn: []
