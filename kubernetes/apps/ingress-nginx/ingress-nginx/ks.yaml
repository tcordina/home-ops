---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: ingress-nginx
  namespace: flux-system
spec:
  interval: 5m
  prune: true
  wait: true

  path: ./kubernetes/apps/ingress-nginx/ingress-nginx/app
  sourceRef:
    kind: GitRepository
    name: flux-system

  dependsOn: []
