---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ingress-nginx
spec:
  interval: 1h
  timeout: 1h
  chart:
    spec:
      chart: ingress-nginx
      version: 4.15.1
      sourceRef:
        kind: HelmRepository
        name: ingress-nginx
  values:
    controller:
      service:
        type: LoadBalancer
      config:
        annotations-risk-level: Critical
      allowSnippetAnnotations: true

      publishService:
        enabled: true

      metrics:
        enabled: true
        serviceMonitor:
          enabled: false

      resources:
        requests:
          cpu: 10m
          memory: 192Mi
        limits: {}

      replicaCount: 3
      updateStrategy:
        rollingUpdate:
          maxSurge: 0
          maxUnavailable: 1
        type: RollingUpdate

      # avoid scheduling more than 1 pod on the same node
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - topologyKey: kubernetes.io/hostname
              labelSelector:
                matchExpressions:
                  - key: app.kubernetes.io/name
                    operator: In
                    values:
                      - '{{ include "ingress-nginx.name" . }}'
                  - key: app.kubernetes.io/instance
                    operator: In
                    values:
                      - "{{ .Release.Name }}"
                  - key: app.kubernetes.io/component
                    operator: In
                    values:
                      - controller

      extraArgs:
        default-ssl-certificate: "cert-manager/wildcard-tablar-ovh-tls"
