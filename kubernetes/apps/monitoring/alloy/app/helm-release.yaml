---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: grafana
spec:
  interval: 12h
  url: https://grafana.github.io/helm-charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: alloy
  namespace: monitoring
spec:
  interval: 30m
  chart:
    spec:
      chart: alloy
      version: 1.8.0
      sourceRef:
        kind: HelmRepository
        name: grafana
  values:
    image:
      registry: docker.io
      repository: grafana/alloy
      tag: v1.16.0

    controller:
      type: daemonset

    alloy:
      configMap:
        create: false
        name: alloy-config
        key: config.alloy

      resources:
        limits:
          cpu: 200m
          memory: 256Mi
        requests:
          cpu: 50m
          memory: 128Mi
