---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  interval: 1h
  timeout: 1h
  chartRef:
    kind: OCIRepository
    name: kube-prometheus-stack
  values:
    crds:
      enabled: true
    cleanPrometheusOperatorObjectNames: true

    # defaultRules:
    #   disabled:
    #     KubeAPIDown: true
    #     KubeAPIInstanceUnreachable: true
    #     KubeControllerManagerDown: true
    #     KubeControllerManagerInstanceUnreachable: true
    #     KubeSchedulerDown: true
    #     KubeSchedulerInstanceUnreachable: true

    prometheus:
      prometheusSpec:
        image:
          registry: ghcr.io
          repository: deckhouse/prompp
          tag: 0.8.4
        # Keep < 3.11.0: at >= 3.11.0 prometheus-operator writes storage.tsdb.retention into
        # the config file, but prompp 0.8.x's parser has no such field (err: "field retention
        # not found in type config.plain") -- below 3.11.0 the operator uses the
        # --storage.tsdb.retention.time flag instead, which prompp accepts. Revisit if a
        # prompp release adds storage.tsdb.retention config support.
        version: v3.10.0
        # nodeSelector:
        #   kubernetes.io/hostname: master-node-1
        serviceMonitorSelectorNilUsesHelmValues: false
        podMonitorSelectorNilUsesHelmValues: false
        probeSelectorNilUsesHelmValues: false
        scrapeConfigSelectorNilUsesHelmValues: false
        ruleSelectorNilUsesHelmValues: false
        externalPrefixNilUsesHelmValues: false
        scrapeInterval: 1m
        retention: 2d
        retentionSize: "10GiB"
        storageSpec:
          volumeClaimTemplate:
            metadata:
              name: data
            spec:
              storageClassName: openebs-lvm
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 15Gi

    grafana:
      envFromSecrets:
        - name: grafana-oidc-secret
      grafana.ini:
        server:
          root_url: "https://grafana.${DOMAIN}/"
        auth:
          disable_login_form: false
        auth.generic_oauth:
          verbose_logging: true
          enabled: true
          name: Keycloak
          allow_sign_up: true
          client_id: "$${GF_AUTH_GENERIC_OAUTH_CLIENT_ID}"
          client_secret: "$${GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET}"
          scopes: openid email profile
          # auth_url must be accessible from the user's browser
          auth_url: https://auth.${DOMAIN}/realms/monitoring/protocol/openid-connect/auth
          # token_url and api_url are server-to-server communications
          token_url: http://keycloak.auth.svc.cluster.local:8080/realms/monitoring/protocol/openid-connect/token
          api_url: http://keycloak.auth.svc.cluster.local:8080/realms/monitoring/protocol/openid-connect/userinfo
          role_attribute_path: "contains(realm_access.roles[*], 'admin') && 'Admin' || 'Viewer'"
          login_attribute_path: preferred_username
          name_attribute_path: name
          email_attribute_path: email
      additionalDataSources:
        - name: Loki
          type: loki
          url: http://loki-gateway
          access: proxy
          isDefault: false
          jsonData:
            httpHeaderName1: "X-Scope-OrgID"
          secureJsonData:
            httpHeaderValue1: "fake"

    alertmanager:
      config:
        global:
          resolve_timeout: 5m
        route:
          group_by: ["alertname", "namespace"]
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 12h
          receiver: "null"
          routes:
            # prometheus stack heartbeat
            - match:
                alertname: Watchdog
              receiver: "null"
            # default routes
            - match:
                severity: critical
              receiver: "telegram"
            - match:
                severity: warning
              receiver: "telegram"

        receivers:
          - name: "null"
          - name: "telegram"
            telegram_configs:
              - bot_token_file: /etc/alertmanager/secrets/alertmanager-telegram-secrets/bot_token
                chat_id: 506962726
                parse_mode: HTML
                message: |
                  {{ range .Alerts }}
                  {{ if eq .Status "firing" }}🔴{{ else }}✅{{ end }} <b>{{ .Status | toUpper }} - {{ .Labels.alertname }}</b>
                  ID: <code>{{ .Fingerprint }}</code>
                  Severity: <b>{{ .Labels.severity | toUpper }}</b>
                  Namespace: {{ .Labels.namespace }}
                  {{ .Annotations.description }}
                  {{ end }}

      alertmanagerSpec:
        secrets:
          - alertmanager-telegram-secrets

    kubelet:
      enabled: true
      serviceMonitor:
        metricRelabelings:
          # Drop high cardinality labels
          - action: labeldrop
            regex: (uid)
          - action: labeldrop
            regex: (id|name)
          - action: drop
            sourceLabels:
              - "__name__"
            regex: (rest_client_request_duration_seconds_bucket|rest_client_request_duration_seconds_sum|rest_client_request_duration_seconds_count)

    kubeApiServer:
      enabled: true
      serviceMonitor:
        metricRelabelings:
          # Drop high cardinality labels
          - action: drop
            sourceLabels:
              - "__name__"
            regex: (apiserver|etcd|rest_client)_request(|_sli|_slo)_duration_seconds_bucket
          - action: drop
            sourceLabels:
              - "__name__"
            regex: (apiserver_response_sizes_bucket|apiserver_watch_events_sizes_bucket)

    kubeEtcd:
      enabled: false

    kubeControllerManager:
      enabled: false

    kubeScheduler:
      enabled: false

    kubeProxy:
      enabled: false
