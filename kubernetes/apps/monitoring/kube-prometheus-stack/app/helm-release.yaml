---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  interval: 1h
  timeout: 1h
  chartRef:
    kind: OCIRepository
    name: kube-prometheus-stack
  values:
    crds:
      enabled: true
    cleanPrometheusOperatorObjectNames: true


    grafana:
      envFromSecrets:
        - name: grafana-oidc-secret
      grafana.ini:
        server:
          root_url: "https://grafana.lan.tablar.ovh/"
        auth:
          disable_login_form: false
        auth.generic_oauth:
          verbose_logging: true
          enabled: true
          name: Keycloak
          allow_sign_up: true
          client_id: "${GF_AUTH_GENERIC_OAUTH_CLIENT_ID}"
          client_secret: "${GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET}"
          scopes: openid email profile
          # auth_url must be accessible from the user's browser
          auth_url: https://auth.lan.tablar.ovh/realms/monitoring/protocol/openid-connect/auth
          # token_url and api_url are server-to-server communications
          token_url: http://keycloak.auth.svc.cluster.local:8080/realms/monitoring/protocol/openid-connect/token
          api_url: http://keycloak.auth.svc.cluster.local:8080/realms/monitoring/protocol/openid-connect/userinfo
          role_attribute_path: "contains(realm_access.roles[*], 'admin') && 'Admin' || 'Viewer'"
          login_attribute_path: preferred_username
          name_attribute_path: name
          email_attribute_path: email
      additionalDataSources:
        - name: Loki
          type: loki
          url: http://loki-gateway
          access: proxy
          isDefault: false
          jsonData:
            httpHeaderName1: "X-Scope-OrgID"
          secureJsonData:
            httpHeaderValue1: "fake"
      ingress:
        enabled: true
        ingressClassName: nginx
        hosts:
          - grafana.lan.tablar.ovh
        tls:
          - hosts:
              - grafana.lan.tablar.ovh


    alertmanager:
      config:
        global:
          resolve_timeout: 5m

        route:
          group_by: ['alertname', 'namespace']
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 12h
          receiver: 'null'
          routes:
            # prometheus stack heartbeat
            - match:
                alertname: Watchdog
              receiver: 'null'
            # false positives on k3s
            - match:
                alertname: KubeControllerManagerDown
              receiver: 'null'
            - match:
                alertname: KubeSchedulerDown
              receiver: 'null'
            # - match:
            #     alertname: KubeEtcdDown
            #   receiver: 'null'
            - match:
                alertname: KubeProxyDown
              receiver: 'null'
            # default routes
            - match:
                severity: critical
              receiver: 'telegram'
            - match:
                severity: warning
              receiver: 'telegram'

        receivers:
          - name: 'null'
          - name: 'telegram'
            telegram_configs:
              - bot_token_file: /etc/alertmanager/secrets/alertmanager-telegram-secrets/bot_token
                chat_id: 506962726
                parse_mode: HTML
                message: |
                  {{ range .Alerts }}
                  {{ if eq .Status "firing" }}🔴{{ else }}✅{{ end }} <b>{{ .Status | toUpper }} - {{ .Labels.alertname }}</b>
                  ID: <code>{{ .Fingerprint }}</code>
                  Severity: <b>{{ .Labels.severity | toUpper }}</b>
                  Namespace: {{ .Labels.namespace }}
                  {{ .Annotations.description }}
                  {{ end }}

      alertmanagerSpec:
        secrets:
          - alertmanager-telegram-secrets

      ingress:
        enabled: true
        ingressClassName: nginx
        hosts:
          - alertmanager.lan.tablar.ovh
        tls:
          - hosts:
              - alertmanager.lan.tablar.ovh


    kubeControllerManager:
      enabled: false

    kubeScheduler:
      enabled: false

    kubeProxy:
      enabled: false


    kubelet:
      serviceMonitor:
        metricRelabelings:
          # drop metrics already scraped by apiserver
          - action: drop
            sourceLabels: [__name__]
            regex: "apiserver_.*|etcd_.*|workqueue_*"


    kubeApiServer:
      enabled: true
      ## needs further documentation reading before uncommenting
      # serviceMonitor:
      #   metricRelabelings:
      #     - action: drop
      #       sourceLabels: [__name__]
      #       regex: "apiserver_request_body_size_bytes_bucket|apiserver_response_sizes_bucket|apiserver_watch_cache_read_wait_seconds_bucket|apiserver_watch_list_duration_seconds_bucket|apiserver_watch_events_sizes_bucket|apiserver_request_sli_duration_seconds_bucket"
      #     - action: drop
      #       sourceLabels: [__name__, verb]
      #       regex: "apiserver_request_duration_seconds_bucket;(WATCH|LIST|APPLY)"
      #     # Go from 24 buckets to 8
      #     # Buckets kept: 0.005, 0.025, 0.05, 0.1, 1, 5, 30, +Inf
      #     - action: drop
      #       sourceLabels: [__name__, le]
      #       regex: "apiserver_request_duration_seconds_bucket;(0\\.(2|4|6|8)|1\\.(25|5)|2\\.0|3\\.0|4\\.0|6\\.0|8\\.0|10\\.0|15\\.0|20\\.0|45\\.0|60\\.0)"
      #     # Go from 24 buckets to 8
      #     # Buckets kept: 0.005, 0.025, 0.05, 0.1, 1, 5, 30, +Inf
      #     - action: drop
      #       sourceLabels: [__name__, le]
      #       regex: "etcd_request_duration_seconds_bucket;(0\\.(2|4|6|8)|1\\.(25|5)|2\\.0|3\\.0|4\\.0|6\\.0|8\\.0|10\\.0|15\\.0|20\\.0|45\\.0|60\\.0)"


    kubeEtcd:
      enabled: true
      endpoints:
        - 10.0.1.11
        - 10.0.1.12
        - 10.0.1.13
      service:
        enabled: true
        port: 2381
        targetPort: 2381
      serviceMonitor:
        scheme: http


    prometheus:
      ingress:
        enabled: true
        ingressClassName: nginx
        hosts:
          - prometheus.lan.tablar.ovh
        tls:
          - hosts:
              - prometheus.lan.tablar.ovh
      prometheusSpec:
        serviceMonitorSelectorNilUsesHelmValues: false
        podMonitorSelectorNilUsesHelmValues: false
        probeSelectorNilUsesHelmValues: false
        scrapeConfigSelectorNilUsesHelmValues: false
        ruleSelectorNilUsesHelmValues: false
        externalPrefixNilUsesHelmValues: false
        scrapeInterval: 1m
        retention: 2d
        retentionSize: "9GiB"
        storageSpec:
          volumeClaimTemplate:
            metadata:
              name: data
            spec:
              storageClassName: longhorn-local
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 10Gi
