---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kube-prometheus-stack
  namespace: flux-system
spec:
  interval: 5m
  prune: true
  wait: true

  path: ./kubernetes/apps/monitoring/kube-prometheus-stack/app
  sourceRef:
    kind: GitRepository
    name: flux-system

  dependsOn: []
