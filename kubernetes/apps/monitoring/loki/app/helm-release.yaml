---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: loki
spec:
  interval: 12h
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: 17.1.5
  url: oci://ghcr.io/grafana-community/helm-charts/loki
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
  namespace: monitoring
spec:
  interval: 1h
  timeout: 1h
  chartRef:
    kind: OCIRepository
    name: loki
  values:
    # Deployment mode: SingleBinary (simple), SimpleScalable (medium), Distributed (large)
    deploymentMode: SingleBinary

    # Number of replicas
    singleBinary:
      replicas: 1
      persistence:
        enabled: true
        storageClass: local-path
      initContainers:
        - name: fix-permissions
          image: busybox:latest
          securityContext:
            privileged: true
            runAsGroup: 0
            runAsNonRoot: false
            runAsUser: 0
          command:
            - sh
            - -c
            - >-
              id;
              ls -la /data/;
              chgrp 10001 /data /data/lost+found;
              chmod g+rwx /data /data/lost+found;
              chmod g+s /data /data/lost+found;
              ls -la /data/
          volumeMounts:
            - mountPath: /data
              name: storage

    # Component replicas (0 when using SingleBinary)
    write:
      replicas: 0
    read:
      replicas: 0
    backend:
      replicas: 0

    chunksCache:
      enabled: false
    resultsCache:
      enabled: false

    # Helm test
    test:
      enabled: false

    loki:
      image:
        registry: docker.io
        repository: grafana/loki
        tag: 3.7.2
      auth_enabled: false
      commonConfig:
        replication_factor: 1
      storage:
        type: filesystem
        filesystem:
          chunks_directory: /var/loki/chunks
          rules_directory: /var/loki/rules
      useTestSchema: true
      limits_config:
        volume_enabled: true

    gateway:
      ingress:
        enabled: true
        ingressClassName: nginx
        hosts:
          - host: loki-gateway.cluster.local
            paths:
              - path: /
                pathType: Prefix
        tls: {}
