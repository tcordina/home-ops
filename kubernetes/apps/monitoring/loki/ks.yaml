apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: loki
  namespace: flux-system
spec:
  dependsOn:
    - name: kube-prometheus-stack
  interval: 5m
  path: ./kubernetes/apps/monitoring/loki/app
  prune: false
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
