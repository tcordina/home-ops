apiVersion: apps/v1
kind: Deployment # TODO : use helm release instead
metadata:
  name: discord-bot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: discord-bot
  template:
    metadata:
      labels:
        app: discord-bot
    spec:
      containers:
        - name: discord-bot
          image: registry.gitlab.com/tcordina/discord-bot:latest@sha256:e3dc26a93d87cfc7906deab6a9b9716a83a77a85e9138b69a6d1d3f6d6e9db27 # {"$imagepolicy": "default:discord-bot"}
          imagePullPolicy: IfNotPresent
          env:
            - name: LOG_LEVEL
              value: "INFO"
          envFrom:
            - secretRef:
                name: discord-bot-secrets
          resources:
            requests:
              memory: "96Mi"
              cpu: "10m"
            limits:
              memory: "128Mi"
              cpu: "100m"
