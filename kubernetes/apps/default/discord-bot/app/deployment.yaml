apiVersion: apps/v1
kind: Deployment # TODO : use helm release instead
metadata:
  name: discord-bot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: discord-bot
  template:
    metadata:
      labels:
        app: discord-bot
    spec:
      containers:
        - name: discord-bot
          image: registry.gitlab.com/tcordina/discord-bot:latest@sha256:5d4a21e99eada702d3c4c6f0c32e231d876cd76c73da0049d183cd9af5a3057c # {"$imagepolicy": "default:discord-bot"}
          imagePullPolicy: IfNotPresent
          env:
            - name: LOG_LEVEL
              value: "INFO"
          envFrom:
            - secretRef:
                name: discord-bot-secrets
          resources:
            requests:
              memory: "96Mi"
              cpu: "10m"
            limits:
              memory: "128Mi"
              cpu: "100m"
