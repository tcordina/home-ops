# kubectl port-forward -n default discord-bot-postgres-xxxx-x 5432:5432

# psql -h localhost -p 5432 -U discord-bot -d discord-bot -c \
#   "\COPY voice_events FROM '/tmp/voice_events.csv' WITH CSV HEADER"

# psql -h localhost -p 5432 -U discord-bot -d discord-bot -c \
