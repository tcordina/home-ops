---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
spec:
  interval: 1h
  timeout: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: default
  values:
    controllers:
      immich:
        strategy: RollingUpdate
        containers:
          main:
            image:
              repository: ghcr.io/immich-app/immich-server
              tag: v2.7.5 # {"$imagepolicy": "multimedia:immich-server:tag"}
            env:
              TZ: ${TIMEZONE}
              IMMICH_MEDIA_LOCATION: &media-location /data
              REDIS_HOSTNAME: '{{ printf "%s-valkey" .Release.Name }}'
              IMMICH_MACHINE_LEARNING_URL: false
              # IMMICH_MACHINE_LEARNING_URL: '{{ printf "http://%s-machine-learning:3003" .Release.Name }}'
              DB_URL:
                valueFrom:
                  secretKeyRef:
                    name: immich-postgres-auth
                    key: DB_URL
              IMMICH_TELEMETRY_INCLUDE: "all"
            ports:
              - name: http
                containerPort: &http-port 2283
                protocol: TCP
              - name: metrics-api
                containerPort: &metrics-api-port 8081
                protocol: TCP
              - name: metrics-ms
                containerPort: &metrics-ms-port 8082
                protocol: TCP
            probes:
              liveness: &immich-probe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/server/ping
                    port: http
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *immich-probe
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/server/ping
                    port: http
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 30
            resources:
              requests:
                cpu: 10m
                memory: 1024Mi
              limits:
                memory: 1024Mi
      valkey:
        containers:
          app:
            image:
              repository: ghcr.io/valkey-io/valkey
              tag: 9.1.0
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  exec:
                    &valkey-probe-exec {
                      command: ["sh", "-c", "valkey-cli ping | grep PONG"],
                    }
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  exec: *valkey-probe-exec
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
              startup:
                enabled: true
                custom: true
                spec:
                  exec: *valkey-probe-exec
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 30
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 64Mi
    service:
      immich:
        controller: immich
        ports:
          http:
            port: *http-port
          metrics-api:
            port: *metrics-api-port
          metrics-ms:
            port: *metrics-ms-port
      valkey:
        controller: valkey
        ports:
          http:
            port: 6379
    ingress:
      main:
        enabled: true
        className: nginx
        annotations:
          # proxy-body-size is set to 0 to remove the body limit on file uploads
          nginx.ingress.kubernetes.io/proxy-body-size: "0"
        hosts:
          - host: immich.${DOMAIN}
            paths:
              - path: /
                service:
                  identifier: immich
                  port: *http-port
        tls:
          - hosts:
              - immich.${DOMAIN}
    # serviceMonitor:
    #   immich:
    #     enabled: true
    #     serviceName: immich
    #     endpoints:
    #       - port: metrics-api
    #         scheme: http
    #         path: /metrics
    #       - port: metrics-ms
    #         scheme: http
    #         path: /metrics
    persistence:
      library:
        type: nfs
        server: ${NFS_IP}
        path: /mnt/main/photos-library
        globalMounts:
          - path: *media-location
