---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cert-manager
  namespace: flux-system
spec:
  interval: 5m
  prune: true
  wait: true

  path: ./kubernetes/apps/cert-manager/cert-manager/app
  sourceRef:
    kind: GitRepository
    name: flux-system

  dependsOn: []
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: certs
  namespace: flux-system
spec:
  interval: 5m
  prune: true
  wait: false

  path: ./kubernetes/apps/cert-manager/cert-manager/certs
  sourceRef:
    kind: GitRepository
    name: flux-system

  dependsOn:
    - name: cert-manager

  decryption:
    provider: sops
