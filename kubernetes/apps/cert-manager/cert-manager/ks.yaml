---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cert-manager
  namespace: flux-system
spec:
  interval: 5m
  path: ./kubernetes/apps/cert-manager/cert-manager/app
  prune: false
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: certs
  namespace: flux-system
spec:
  dependsOn:
    - name: cert-manager
  interval: 5m
  path: ./kubernetes/apps/cert-manager/cert-manager/certs
  prune: false
  wait: false
  sourceRef:
    kind: GitRepository
    name: flux-system
