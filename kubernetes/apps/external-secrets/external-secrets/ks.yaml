---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: external-secrets
  namespace: flux-system
spec:
  interval: 5m
  prune: true
  wait: true

  path: ./kubernetes/apps/external-secrets/external-secrets/app
  sourceRef:
    kind: GitRepository
    name: flux-system

  dependsOn: []
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: external-secrets-bitwarden
  namespace: flux-system
spec:
  interval: 5m
  prune: true
  wait: false

  path: ./kubernetes/apps/external-secrets/external-secrets/bitwarden
  sourceRef:
    kind: GitRepository
    name: flux-system

  dependsOn:
    - name: external-secrets
    - name: cert-manager
