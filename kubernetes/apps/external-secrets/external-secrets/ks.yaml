---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: external-secrets
  namespace: flux-system
spec:
  interval: 5m
  path: ./kubernetes/apps/external-secrets/external-secrets/app
  prune: false
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: external-secrets-bitwarden
  namespace: flux-system
spec:
  dependsOn:
    - name: external-secrets
    - name: cert-manager
  interval: 5m
  path: ./kubernetes/apps/external-secrets/external-secrets/bitwarden
  prune: false
  wait: false
  sourceRef:
    kind: GitRepository
    name: flux-system
