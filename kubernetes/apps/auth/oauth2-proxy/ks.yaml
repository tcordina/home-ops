---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app oauth2-proxy
  namespace: flux-system
spec:
  interval: 5m
  retryInterval: 2m
  timeout: 15m
  prune: true
  wait: false
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app

  path: ./kubernetes/apps/auth/oauth2-proxy/app
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system

  dependsOn:
    - name: keycloak
      namespace: flux-system
