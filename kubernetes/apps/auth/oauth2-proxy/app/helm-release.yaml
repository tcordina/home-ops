---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: oauth2-proxy
spec:
  interval: 24h
  url: https://oauth2-proxy.github.io/manifests
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: oauth2-proxy
spec:
  interval: 1h
  chart:
    spec:
      chart: oauth2-proxy
      version: 10.7.0
      sourceRef:
        kind: HelmRepository
        name: oauth2-proxy
  values:
    config:
      existingSecret: oauth2-proxy-secrets

    extraArgs:
      provider: keycloak-oidc
      oidc-issuer-url: "https://auth.${DOMAIN}/realms/home"
      upstream: "static://202"
      http-address: "0.0.0.0:4180"
      reverse-proxy: "true"
      skip-provider-button: "true"
      cookie-secure: "true"
      cookie-samesite: "lax"
      cookie-domain: ".${DOMAIN}"
      whitelist-domain: ".${DOMAIN}"
      email-domain: "*"
      set-xauthrequest: "true"
      skip-jwt-bearer-tokens: "true"
      # allowed-group: "home-users"

    gatewayApi:
      enabled: true
      gatewayRef:
        name: main-gateway
        namespace: network
        sectionName: https
      hostnames:
        - oauth2-proxy.${DOMAIN}

    resources:
      requests:
        cpu: 10m
        memory: 48Mi
      limits:
        memory: 48Mi
