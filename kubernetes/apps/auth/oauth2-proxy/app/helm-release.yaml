---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: oauth2-proxy
spec:
  interval: 24h
  url: https://oauth2-proxy.github.io/manifests
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: oauth2-proxy
spec:
  interval: 1h
  chart:
    spec:
      chart: oauth2-proxy
      version: 10.4.3
      sourceRef:
        kind: HelmRepository
        name: oauth2-proxy
  values:
    config:
      existingSecret: oauth2-proxy-secrets

    extraArgs:
      provider: keycloak-oidc
      oidc-issuer-url: "https://auth.lan.tablar.ovh/realms/home"
      upstream: "static://202"
      http-address: "0.0.0.0:4180"
      reverse-proxy: "true"
      skip-provider-button: "true"
      cookie-secure: "true"
      cookie-samesite: "lax"
      cookie-domain: ".lan.tablar.ovh"
      whitelist-domain: ".lan.tablar.ovh"
      email-domain: "*"
      set-xauthrequest: "true"
      skip-jwt-bearer-tokens: "true"
      # allowed-group: "home-users"

    ingress:
      enabled: true
      className: nginx
      annotations:
        nginx.ingress.kubernetes.io/proxy-buffer-size: "8k"
      hosts:
        - oauth2-proxy.lan.tablar.ovh
      path: /
      pathType: Prefix
      tls:
        - hosts:
            - oauth2-proxy.lan.tablar.ovh

    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      # limits:
      #   cpu: 100m
      #   memory: 128Mi
