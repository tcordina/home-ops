apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name oauth2-proxy-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-secretsmanager
    kind: ClusterSecretStore
  target:
    name: *name
  dataFrom:
    - extract:
        key: "auth/oauth2-proxy"
# contains :
# client-id
# client-secret
# cookie-secret (generated with `openssl rand -base64 32 | tr -- '+/' '-_'`)
