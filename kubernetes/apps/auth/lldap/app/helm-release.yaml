apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app lldap
  namespace: auth
spec:
  interval: 1h
  timeout: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: default
  values:
    controllers:
      lldap:
        containers:
          app:
            image:
              repository: ghcr.io/lldap/lldap
              tag: v0.6.3
            env:
              TZ: ${TIMEZONE}
              LLDAP_HTTP_PORT: &http-port 8080
              LLDAP_HTTP_URL: https://lldap.${DOMAIN}
              LLDAP_LDAP_PORT: &ldap-port 5389
            envFrom:
              - secretRef:
                  name: lldap-secrets
            resources:
              requests:
                cpu: 100m
                memory: 100Mi
              limits:
                memory: 500Mi

    service:
      app:
        controller: *app
        ports:
          http:
            port: *http-port
          ldap:
            enabled: true
            port: *ldap-port

    route:
      main:
        enabled: true
        kind: HTTPRoute
        parentRefs:
          - name: main-gateway
            namespace: network
            sectionName: https
        hostnames:
          - lldap.${DOMAIN}
        rules:
          - backendRefs:
              - identifier: app
                port: *http-port

    persistence:
      data:
        existingClaim: ${APP}
        globalMounts:
          - path: /data