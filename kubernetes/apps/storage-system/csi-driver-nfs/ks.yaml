---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: csi-driver-nfs
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 2m
  timeout: 15m
  prune: true
  wait: false

  path: ./kubernetes/apps/storage-system/csi-driver-nfs/app
  sourceRef:
    kind: GitRepository
    name: flux-system

  dependsOn: []
