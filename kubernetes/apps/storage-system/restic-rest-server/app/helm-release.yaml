# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: restic-rest-server
  namespace: storage-system
spec:
  interval: 1h
  timeout: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: default
  values:
    controllers:
      restic-rest-server:
        containers:
          app:
            image:
              repository: restic/rest-server
              tag: 0.14.0
            env:
              DATA_DIRECTORY: /data
              OPTIONS: --no-auth --prometheus --prometheus-no-auth
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 256Mi
        pod:
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch

    service:
      app:
        ports:
          http:
            port: 8000

    persistence:
      data:
        type: nfs
        server: ${NFS_IP}
        path: ${NFS_VOLUMES_PATH}
        globalMounts:
          - path: /data
            subPath: restic-backups
