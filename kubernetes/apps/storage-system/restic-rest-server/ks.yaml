apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app restic-rest-server
  namespace: flux-system
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  dependsOn:
    - name: csi-driver-nfs
      namespace: flux-system
  interval: 5m
  path: ./kubernetes/apps/storage-system/restic-rest-server/app
  prune: false
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
