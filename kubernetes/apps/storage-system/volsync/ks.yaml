apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: volsync
  namespace: flux-system
spec:
  dependsOn:
    - name: snapshot-controller
      namespace: flux-system
  interval: 5m
  path: ./kubernetes/apps/storage-system/volsync/app
  prune: false
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
