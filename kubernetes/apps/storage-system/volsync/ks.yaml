---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: volsync
  namespace: flux-system
spec:
  interval: 5m
  prune: true
  wait: true

  path: ./kubernetes/apps/storage-system/volsync/app
  sourceRef:
    kind: GitRepository
    name: flux-system

  dependsOn:
    - name: openebs
      namespace: flux-system
    - name: restic-rest-server
      namespace: flux-system
