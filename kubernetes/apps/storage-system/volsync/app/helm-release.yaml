---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: volsync
  namespace: storage-system
spec:
  chartRef:
    kind: OCIRepository
    name: volsync
  interval: 1h
  timeout: 1h
  values:
    manageCRDs: true
    replicaCount: 1

    metrics:
      disableAuth: true

    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
