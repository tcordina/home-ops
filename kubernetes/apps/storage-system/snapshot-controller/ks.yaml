---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: snapshot-controller
  namespace: flux-system
spec:
  interval: 5m
  prune: true
  wait: true

  path: ./kubernetes/apps/storage-system/snapshot-controller/app
  sourceRef:
    kind: GitRepository
    name: flux-system

  dependsOn: []
