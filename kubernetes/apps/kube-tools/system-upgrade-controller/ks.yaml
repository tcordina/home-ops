---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: system-upgrade-controller
  namespace: flux-system
spec:
  interval: 5m
  path: ./kubernetes/apps/kube-tools/system-upgrade-controller/app
  prune: false
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: system-upgrade-controller-plans
  namespace: flux-system
spec:
  interval: 5m
  path: ./kubernetes/apps/kube-tools/system-upgrade-controller/plans
  prune: false
  wait: false
  sourceRef:
    kind: GitRepository
    name: flux-system
