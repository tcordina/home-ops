---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app uptime-kuma
spec:
  interval: 1h
  timeout: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: default
  values:
    controllers:
      uptime-kuma:
        containers:
          app:
            env:
              TZ: "${TIMEZONE}"
            image:
              repository: louislam/uptime-kuma
              tag: 2.4.0-slim-rootless
            ports:
              - name: http
                containerPort: &port 3001
                protocol: TCP
            resources:
              requests:
                cpu: 10m
                memory: 50Mi
              limits:
                memory: 150Mi

    service:
      app:
        controller: uptime-kuma
        ports:
          http:
            port: *port
            protocol: TCP

    route:
      app:
        enabled: true
        kind: HTTPRoute
        parentRefs:
          - name: main-gateway
            namespace: network
            sectionName: https
        hostnames:
          - uptime.${DOMAIN}
        rules:
          - backendRefs:
              - identifier: app
                port: *port

    persistence:
      config:
        existingClaim: ${APP}
        advancedMounts:
          uptime-kuma:
            app:
              - path: /app/data
