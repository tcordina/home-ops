---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard-tablar-ovh
  namespace: default
spec:
  secretName: wildcard-tablar-ovh-tls
  
  duration: 2160h # valid for 90 days
  renewBefore: 120h # renew 5 days before expiration
  
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  
  dnsNames:
    - lan.tablar.ovh
    - "*.lan.tablar.ovh"
  
  usages:
    - digital signature
    - key encipherment