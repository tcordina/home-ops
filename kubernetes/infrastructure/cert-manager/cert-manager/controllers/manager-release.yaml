---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: cert-manager
spec:
  interval: 1h
  url: https://charts.jetstack.io
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
spec:
  interval: 30m
  chart:
    spec:
      chart: cert-manager
      version: '1.19.x'
      sourceRef:
        kind: HelmRepository
        name: cert-manager
      interval: 12h
  values:
    crds:
      enabled: true
      keep: true
    prometheus:
      enabled: true
