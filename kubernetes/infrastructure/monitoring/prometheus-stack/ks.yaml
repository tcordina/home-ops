apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: prometheus-stack
  namespace: flux-system
spec:
  dependsOn:
  - name: csi-driver-nfs
  interval: 5m
  path: ./kubernetes/infrastructure/monitoring/prometheus-stack/app
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  decryption:
    provider: sops
    secretRef:
      name: sops-age
