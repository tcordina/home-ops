apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: loki
  namespace: flux-system
spec:
  dependsOn:
  - name: prometheus-stack
  interval: 5m
  path: ./kubernetes/infrastructure/monitoring/loki/app
  prune: true
  wait: true
  targetNamespace: monitoring
  sourceRef:
    kind: GitRepository
    name: flux-system
  decryption:
    provider: sops
    secretRef:
      name: sops-age
