apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: snapshot-controller
  namespace: flux-system
spec:
  interval: 5m
  path: ./kubernetes/infrastructure/longhorn-system/snapshot-controller/app
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
