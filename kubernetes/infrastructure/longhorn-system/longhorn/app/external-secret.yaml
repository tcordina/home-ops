apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name backblaze-auth-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-secretsmanager
    kind: ClusterSecretStore
  target:
    name: *name
  dataFrom:
    - extract:
        key: "longhorn-system/backblaze-auth"
