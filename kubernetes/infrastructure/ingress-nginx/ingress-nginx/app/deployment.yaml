---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: ingress-nginx
spec:
  interval: 12h
  url: https://kubernetes.github.io/ingress-nginx
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ingress-nginx
spec:
  interval: 1h
  timeout: 1h
  chart:
    spec:
      chart: ingress-nginx
      version: '4.x'
      sourceRef:
        kind: HelmRepository
        name: ingress-nginx
  values:
    controller:
      service:
        type: LoadBalancer

      publishService:
        enabled: true

      metrics:
        enabled: true
        serviceMonitor:
          enabled: false

      replicaCount: 1

      extraArgs:
        default-ssl-certificate: "cert-manager/wildcard-tablar-ovh-tls"
