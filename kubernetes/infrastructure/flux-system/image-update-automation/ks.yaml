apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: image-update-automation
  namespace: flux-system
spec:
  interval: 5m
  path: ./kubernetes/infrastructure/flux-system/image-update-automation/app
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  targetNamespace: flux-system
  decryption:
    provider: sops
    secretRef:
      name: sops-age
