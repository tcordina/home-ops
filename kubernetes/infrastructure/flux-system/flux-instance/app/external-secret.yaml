apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name flux-system
  namespace: flux-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-secretsmanager
    kind: ClusterSecretStore
  target:
    name: *name
  dataFrom:
  - extract:
      key: "flux-system/flux-system"