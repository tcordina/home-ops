---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-secrets
spec:
  interval: 1h
  timeout: 1h
  chartRef:
    kind: OCIRepository
    name: external-secrets
  values:
    image:
      repository: ghcr.io/external-secrets/external-secrets
    installCRDs: true
    bitwarden-sdk-server:
      enabled: true
