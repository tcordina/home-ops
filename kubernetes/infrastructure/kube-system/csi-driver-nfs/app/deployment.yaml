---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: csi-driver-nfs
spec:
  interval: 12h
  url: https://raw.githubusercontent.com/kubernetes-csi/csi-driver-nfs/master/charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: csi-driver-nfs
spec:
  interval: 1h
  timeout: 10m
  chart:
    spec:
      chart: csi-driver-nfs
      version: '4.12.x'
      sourceRef:
        kind: HelmRepository
        name: csi-driver-nfs
  values:
    controller:
      runOnMaster: false
