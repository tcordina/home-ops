---
helmDefaults:
  cleanupOnFail: true
  timeout: 900 # 15m timeout because my internet sucks
  wait: true
  waitForJobs: true

hooks:
  - events: ["presync"]
    command: "kubectl"
    args: ["api-resources", "--cached=false"]

repositories:
  - name: ingress-nginx
    url: https://kubernetes.github.io/ingress-nginx

releases:
  - name: certs
    namespace: cert-manager
    # Pointing to a local directory without a helm chart uses Chartify to make a helm chart out of the manifests present in said directory
    chart: ../../infrastructure/cert-manager/cert-manager/certs/

  - name: bitwarden-config
    namespace: external-secrets
    # Pointing to a local directory without a helm chart uses Chartify to make a helm chart out of the manifests present in said directory
    chart: ../../infrastructure/external-secrets/external-secrets/bitwarden/
    needs:
      - cert-manager/certs

  - name: external-secrets
    namespace: external-secrets
    chart: oci://ghcr.io/external-secrets/charts/external-secrets
    version: 2.0.0
    values:
      - ./templates/values.yaml.gotmpl
    needs:
      - external-secrets/bitwarden-config

  - name: ingress-nginx
    namespace: ingress-nginx
    createNamespace: true
    chart: ingress-nginx/ingress-nginx
    version: 4.14.3
    values:
      - ./templates/values.yaml.gotmpl
    needs:
      - external-secrets/external-secrets

  - name: kube-prometheus-stack
    namespace: monitoring
    chart: oci://ghcr.io/prometheus-community/charts/kube-prometheus-stack
    version: 82.0.2
    values:
      - ./templates/values.yaml.gotmpl
    needs:
      - ingress-nginx/ingress-nginx

  - name: flux-operator
    namespace: flux-system
    chart: oci://ghcr.io/controlplaneio-fluxcd/charts/flux-operator
    version: 0.41.1
    values:
      - ./templates/values.yaml.gotmpl
    needs:
      - monitoring/kube-prometheus-stack

  - name: flux-instance
    namespace: flux-system
    chart: oci://ghcr.io/controlplaneio-fluxcd/charts/flux-instance
    version: 0.41.1
    wait: false
    values:
      - ./templates/values.yaml.gotmpl
    needs:
      - flux-system/flux-operator
