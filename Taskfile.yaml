---
# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"

dotenv:
  - ".env"

vars:
  # Directories
  KUBERNETES_DIR: "{{.ROOT_DIR}}/kubernetes"
  # Files
  AGE_FILE: "{{.ROOT_DIR}}/age.agekey"
  KUBECONFIG: "{{.ROOT_DIR}}/kubeconfig"
  SOPS_CONFIG_FILE: "{{.ROOT_DIR}}/.sops.yaml"

includes:
  bootstrap: .taskfiles/bootstrap.yaml
  flux: .taskfiles/flux.yaml
  multipass: .taskfiles/multipass.yaml
  pre-commit: .taskfiles/pre-commit.yaml
  renovate: .taskfiles/renovate.yaml
  shell: .taskfiles/shell.yaml
  sops: .taskfiles/sops.yaml
  tf: .taskfiles/terraform.yaml
