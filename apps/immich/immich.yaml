apiVersion: v1
kind: Namespace
metadata:
  name: immich
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: immich
  namespace: immich
spec:
  interval: 1h
  url: oci://ghcr.io/immich-app/immich-charts/immich
  ref:
    semver: "0.x"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: immich-library
  namespace: immich
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: nfs-csi
  resources:
    requests:
      storage: 10Gi
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
  namespace: immich
spec:
  interval: 30m
  timeout: 10m
  chartRef:
    kind: OCIRepository
    name: immich
    namespace: immich
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Ingress
              name: immich-server
            patch: |
              - op: add
                path: /spec/ingressClassName
                value: nginx
  values:
    # Configuration du contrôleur principal
    controllers:
      main:
        containers:
          main:
            image:
              tag: v2.2.3 # {"$imagepolicy": "flux-system:immich-server:tag"}
            env:
              REDIS_HOSTNAME: '{{ printf "%s-valkey" .Release.Name }}'
              # IMMICH_MACHINE_LEARNING_URL: '{{ printf "http://%s-machine-learning:3003" .Release.Name }}'
              # Variables DB si vous utilisez une DB externe
              DB_HOSTNAME: immich-postgresql
              DB_PORT: "5432"
              DB_USERNAME: immich
              DB_PASSWORD: immich
              DB_DATABASE_NAME: immich
    # Configuration Immich
    immich:
      persistence:
        library:
          # Créer un PVC pour le stockage des photos
          existingClaim: immich-library
      # Métriques Prometheus (optionnel)
      metrics:
        enabled: false
    # Valkey (Redis fork) - cache pour les jobs
    valkey:
      enabled: true
      persistence:
        data:
          enabled: true
          size: 1Gi
          type: persistentVolumeClaim
          accessMode: ReadWriteOnce
          storageClass: nfs-csi
    # Serveur Immich (API + Web)
    server:
      enabled: true
      ingress:
        main:
          enabled: true
          ingressClassName: nginx
          annotations:
            nginx.ingress.kubernetes.io/proxy-body-size: "0"
          hosts:
            - host: immich.lan.tablar.ovh
              paths:
                - path: /
                  service:
                    identifier: main
          tls:
            - hosts:
                - immich.lan.tablar.ovh
    # Machine Learning (reconnaissance faciale, objets, etc.)
    machine-learning:
      enabled: false
      # persistence:
      #   cache:
      #     enabled: true
      #     size: 10Gi
      #     type: persistentVolumeClaim
      #     accessMode: ReadWriteOnce
      #     storageClass: nfs-csi
