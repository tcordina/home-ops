---
apiVersion: v1
kind: Namespace
metadata:
  name: uptime-kuma
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: uptime-kuma
  namespace: flux-system
spec:
  interval: 1h
  url: https://dirsigler.github.io/uptime-kuma-helm
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: uptime-kuma-database
  namespace: uptime-kuma
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 4Gi
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: uptime-kuma
  namespace: flux-system
spec:
  interval: 30m
  chart:
    spec:
      chart: uptime-kuma
      version: '2.x'
      sourceRef:
        kind: HelmRepository
        name: uptime-kuma
        namespace: flux-system
      interval: 12h
  targetNamespace: uptime-kuma
  install:
    createNamespace: true
  values:
    # use alpine instead of debian based image
    image:
      repository: louislam/uptime-kuma
      tag: "1-alpine"
      pullPolicy: IfNotPresent

    ingress:
      enabled: true
      className: nginx
      hosts:
        - host: uptime.lan.tablar.ovh
          paths:
            - path: /
              pathType: ImplementationSpecific
    
    volume:
      enabled: false
      existingClaim: "uptime-kuma-database"