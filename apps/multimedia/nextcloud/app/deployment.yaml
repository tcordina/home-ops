---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: nextcloud
spec:
  interval: 12h
  url: https://nextcloud.github.io/helm/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &service-name nextcloud
spec:
  interval: 1h
  chart:
    spec:
      chart: nextcloud
      version: '8.x'
      sourceRef:
        kind: HelmRepository
        name: *service-name
      interval: 12h
  values:
    image:
      tag: stable-fpm-alpine
    nextcloud:
      host: nextcloud.lan.tablar.ovh
      username: admin
      password: admin
      configs:
        proxy.config.php: |-
          <?php
          $CONFIG = array (
            'trusted_proxies' => array(
              0 => '127.0.0.1',
              1 => '10.0.0.0/8',
              3 => '192.168.1.1'
            ),
            'forwarded_for_headers' => array('HTTP_X_FORWARDED_FOR'),
          );
    persistence:
      enabled: true
      existingClaim: nextcloud-library
    nginx:
      enabled: true
    internalDatabase:
      enabled: false
    externalDatabase:
      enabled: true
      type: postgresql
      host: "nextcloud-postgresql:5432"
      database: *service-name
      user: *service-name
      password: *service-name
    # postgresql:
    #   enabled: true
    #   global:
    #     postgresql:
    #       auth:
    #         database: *service-name
    #         username: *service-name
    #         password: *service-name
    #   primary:
    #     persistence:
    #       enabled: true
    #       existingClaim: nextcloud-postgresql-data
    ingress:
      enabled: true
      className: nginx
      annotations:
        nginx.ingress.kubernetes.io/affinity: cookie
        nginx.ingress.kubernetes.io/enable-cors: "true"
        nginx.ingress.kubernetes.io/cors-allow-headers: "X-Forwarded-For"
      host: nextcloud.lan.tablar.ovh
      path: /
      pathType: Prefix
      tls:
        - hosts:
            - nextcloud.lan.tablar.ovh
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
