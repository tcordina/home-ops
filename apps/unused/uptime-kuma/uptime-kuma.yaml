---
apiVersion: v1
kind: Namespace
metadata:
  name: uptime-kuma
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: uptime-kuma
  namespace: uptime-kuma
spec:
  interval: 1h
  url: https://dirsigler.github.io/uptime-kuma-helm
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: uptime-kuma
  namespace: uptime-kuma
spec:
  interval: 30m
  timeout: 10m
  chart:
    spec:
      chart: uptime-kuma
      version: '2.x'
      sourceRef:
        kind: HelmRepository
        name: uptime-kuma
        namespace: uptime-kuma
      interval: 12h
  values:
    # use alpine instead of debian based image
    image:
      repository: louislam/uptime-kuma
      tag: "1-alpine"
      pullPolicy: IfNotPresent

    ingress:
      enabled: true
      className: nginx
      hosts:
        - host: uptime.lan.tablar.ovh
          paths:
            - path: /
              pathType: ImplementationSpecific
      tls:
        - hosts:
          - uptime.lan.tablar.ovh
    
    volume:
      enabled: true
      existingClaim: "uptime-kuma-database"