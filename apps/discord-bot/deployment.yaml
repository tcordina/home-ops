---
apiVersion: v1
kind: Namespace
metadata:
  name: discord-bot
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: discord-bot
  namespace: discord-bot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: discord-bot
  template:
    metadata:
      labels:
        app: discord-bot
    spec:
      # imagePullSecrets:
      #   - name: gitlab-registry-secret
      containers:
        - name: discord-bot
          image: registry.gitlab.com/tcordina/discord-bot:latest@sha256:540bcfdca51cbca455baa32a93170dc6d3d01e883a2d261def17ed0531f63717 # {"$imagepolicy": "flux-system:discord-bot"}
          imagePullPolicy: IfNotPresent
          env:
            - name: DISCORD_TOKEN
              valueFrom:
                secretKeyRef:
                  name: discord-bot-secrets
                  key: discord-token
            - name: HCLOUD_TOKEN
              valueFrom:
                secretKeyRef:
                  name: discord-bot-secrets
                  key: hcloud-token
            - name: LOG_LEVEL
              value: "INFO"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"