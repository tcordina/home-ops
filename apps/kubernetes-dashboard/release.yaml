apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kubernetes-dashboard
  namespace: flux-system
spec:
  interval: 30m
  chart:
    spec:
      chart: kubernetes-dashboard
      version: '7.x'
      sourceRef:
        kind: HelmRepository
        name: kubernetes-dashboard
        namespace: flux-system
      interval: 12h
  targetNamespace: kubernetes-dashboard
  install:
    createNamespace: true
  values:
    app:
      ingress:
        enabled: true
        ingressClassName: traefik
        hosts:
          - kube.lab.home
        annotations:
          traefik.ingress.kubernetes.io/router.entrypoints: web
          # Indique à Traefik que le backend utilise HTTPS
          traefik.ingress.kubernetes.io/service.serversscheme: https
    
    # Configuration pour le service - on garde kong activé mais on expose via ingress
    kong:
      proxy:
        tls:
          servicePort: 8443
    
    metricsScraper:
      enabled: false