apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kubernetes-dashboard
  namespace: flux-system
spec:
  interval: 30m
  chart:
    spec:
      chart: kubernetes-dashboard
      version: '7.x'
      sourceRef:
        kind: HelmRepository
        name: kubernetes-dashboard
        namespace: flux-system
      interval: 12h
  targetNamespace: kubernetes-dashboard
  install:
    createNamespace: true
  values:
    app:
      ingress:
        enabled: true
        ingressClassName: nginx
        hosts:
          - kube.lab.home
        pathType: Prefix
        annotations:
          nginx.ingress.kubernetes.io/backend-protocol: HTTPS
          nginx.ingress.kubernetes.io/ssl-redirect: "false"
    
    # Configuration Kong (nécessaire pour le chart)
    kong:
      proxy:
        tls:
          enabled: true
          servicePort: 8443
    
    # Métriques (optionnel)
    metricsScraper:
      enabled: false