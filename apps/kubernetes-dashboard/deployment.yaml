---
apiVersion: v1
kind: Namespace
metadata:
  name: kubernetes-dashboard
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: kubernetes-dashboard
  namespace: flux-system
spec:
  interval: 1h
  url: https://kubernetes.github.io/dashboard/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kubernetes-dashboard
  namespace: flux-system
spec:
  interval: 30m
  chart:
    spec:
      chart: kubernetes-dashboard
      version: '7.x'
      sourceRef:
        kind: HelmRepository
        name: kubernetes-dashboard
        namespace: flux-system
      interval: 12h
  targetNamespace: kubernetes-dashboard
  install:
    createNamespace: true
  values:
    app:
      ingress:
        enabled: true
        ingressClassName: nginx
        hosts:
          - kube.lan.tablar.ovh
        pathType: Prefix
    
    # Configuration Kong (nécessaire pour le chart)
    kong:
      proxy:
        tls:
          enabled: true
          servicePort: 8443
    
    # Métriques (optionnel)
    metricsScraper:
      enabled: false