apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: grafana
  namespace: monitoring
spec:
  interval: 24h
  url: https://grafana.github.io/helm-charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
  namespace: monitoring
spec:
  interval: 30m
  chart:
    spec:
      chart: loki
      version: '>=6.0.0'
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: monitoring
  values:
    # Deployment mode: SingleBinary (simple), SimpleScalable (medium), Distributed (large)
    deploymentMode: SingleBinary

    # Number of replicas
    singleBinary:
      replicas: 1
      persistence:
        enabled: true
        storageClass: nfs-csi
      initContainers:
      - name: fix-permissions
        image: busybox:latest
        securityContext:
          privileged: true
          runAsGroup: 0
          runAsNonRoot: false
          runAsUser: 0
        command:
        - sh
        - -c
        - >-
          id;
          ls -la /data/;
          chgrp 10001 /data /data/lost+found;
          chmod g+rwx /data /data/lost+found;
          chmod g+s /data /data/lost+found;
          ls -la /data/
        volumeMounts:
        - mountPath: /data
          name: storage

    # Component replicas (0 when using SingleBinary)
    write:
      replicas: 0
    read:
      replicas: 0
    backend:
      replicas: 0

    chunksCache:
      enabled: false
    resultsCache:
      enabled: false

    # Helm test
    test:
      enabled: false

    loki:
      auth_enabled: false
      commonConfig:
        replication_factor: 1
      storage:
        type: filesystem
        filesystem:
          directory: /var/loki/chunks
      useTestSchema: true
      limits_config:  
        volume_enabled: true

    gateway:
      ingress:
        enabled: true
        ingressClassName: nginx
        hosts:
          - loki-gateway.cluster.local
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: promtail
  namespace: monitoring
spec:
  interval: 30m
  chart:
    spec:
      chart: promtail
      version: '>=6.0.0'
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: monitoring
  values:
    config:
      clients:
        - url: http://loki:3100/loki/api/v1/push
    
    resources:
      limits:
        cpu: 200m
        memory: 128Mi
      requests:
        cpu: 50m
        memory: 64Mi